<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>结算 - PromptHub</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .pay-container { max-width: 500px; margin: 50px auto; background: var(--card-bg); padding: 30px; border-radius: 20px; text-align: center; }
        .qr-code { width: 200px; height: 200px; background: #fff; margin: 20px auto; padding: 10px; }
        .qr-code img { width: 100%; height: 100%; }
        .steps { text-align: left; margin: 20px 0; font-size: 0.9rem; color: var(--text-dim); }
        .steps li { margin-bottom: 10px; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #334155; background: #0f172a; color: white; }
    </style>
</head>
<body class="dark-theme">
    <div class="pay-container">
        <h2 id="itemTitle">正在获取资源...</h2>
        <p class="price" id="itemPrice" style="font-size: 1.5rem;"></p>
        
        <div class="qr-code">
            <!-- 这里替换成你的微信收款码图片 -->
            <img src="images/wepay-qr.png" alt="请替换收款码">
        </div>
        
        <div class="steps">
            <ol>
                <li>长按识别上方二维码支付</li>
                <li>支付成功后，输入您的<strong>微信/邮箱</strong></li>
                <li>点击“提交订单”，后台核实后 5 分钟内发货</li>
            </ol>
        </div>

        <input type="text" id="userContact" placeholder="您的微信号或邮箱（必填）">
        <button class="buy-btn" style="width: 100%; padding: 15px;" onclick="submitOrder()">提交订单</button>
        <p style="margin-top: 15px; font-size: 0.8rem; color: var(--text-dim);">如有疑问，请联系客服微信：your_wechat_id</p>
    </div>

    <script>
        // 简单逻辑：从URL获取信息
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        
        // 模拟从列表找数据
        fetch('data/prompts.json').then(res => res.json()).then(data => {
            const item = data.find(p => p.id == id);
            if(item) {
                document.getElementById('itemTitle').innerText = `获取：${item.title}`;
                document.getElementById('itemPrice').innerText = `¥${item.price}`;
            }
        });

        function submitOrder() {
            const contact = document.getElementById('userContact').value;
            if(!contact) return alert('请填写联系方式');
            
            // 这里可以通过 Firebase Firestore 存储订单
            alert('订单提交成功！请确保已支付，系统核实后将发送至您的联系方式。');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
